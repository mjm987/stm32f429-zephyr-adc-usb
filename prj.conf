# Kernel Configuration
CONFIG_KERNEL_LOGGING=y
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=2
CONFIG_LOG_PRINTK=y

# Disable Keyboard Scanner (fixes kscan.yaml error)
CONFIG_KSCAN=n
CONFIG_KSCAN_MATRIX=n
CONFIG_KSCAN_GPIO_MATRIX=n

# ADC Configuration
CONFIG_ADC=y

# DMA Configuration
CONFIG_DMA=y
CONFIG_DMA_STM32=y

# Timer Configuration  
CONFIG_TIMER=y
CONFIG_COUNTER=y

# USB Configuration
CONFIG_USB_DEVICE_DRIVER=y
CONFIG_USB_DEVICE_STACK=y
CONFIG_USB_MAX_POWER=500
CONFIG_USB_DEVICE_VID=0x2FE3
CONFIG_USB_DEVICE_PID=0x0100

# Threading
CONFIG_THREAD_PRIORITY_COOPERATIVE=8
CONFIG_NUM_COOP_PRIORITIES=8
CONFIG_MAIN_THREAD_PRIORITY=0
CONFIG_PREEMPT_ENABLED=y

# Memory
CONFIG_HEAP_MEM_POOL_SIZE=65536
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048

# Misc
CONFIG_NEWLIB_LIBC=y
